trigger:
  branches:
    include:
      - main

variables:
  ACR_NAME: epicbookregistry.azurecr.io
  VM_USER: azureuser
  VM_HOST: 52.188.23.59

stages:

- stage: Build
  displayName: Build and push images
  jobs:
  - job: BuildImages
    pool:
      vmImage: ubuntu-latest
    steps:

    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: epicbook-acr

    - task: Docker@2
      displayName: Build and push app image
      inputs:
        command: buildAndPush
        repository: epicbook-app
        dockerfile: app/Dockerfile
        containerRegistry: epicbook-acr
        buildContext: app
        tags: |
          $(Build.BuildId)
          latest

    - task: Docker@2
      displayName: Build and push proxy image
      inputs:
        command: buildAndPush
        repository: epicbook-proxy
        dockerfile: proxy/Dockerfile
        containerRegistry: epicbook-acr
        buildContext: proxy
        tags: |
          $(Build.BuildId)
          latest

- stage: Deploy
  displayName: Deploy to Azure VM
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployToVM
    pool:
      vmImage: ubuntu-latest
    steps:

    - script: |
        echo "Setting up SSH key..."
        mkdir -p ~/.ssh
        echo "$(VM_SSH_PRIVATE_KEY)" | base64 -d > ~/.ssh/epicbook_key
        chmod 600 ~/.ssh/epicbook_key
        echo "$(VM_KNOWN_HOST)" >> ~/.ssh/known_hosts
        echo "SSH key installed successfully"
        file ~/.ssh/epicbook_key
      displayName: Setup SSH key

    - script: |
        ssh -i ~/.ssh/epicbook_key \
            -o StrictHostKeyChecking=no \
            $(VM_USER)@$(VM_HOST) \
            "cd ~/epicbook-capstone && \
             docker login $(ACR_NAME) -u $(ACR_USERNAME) -p $(ACR_PASSWORD) && \
             docker compose pull && \
             docker compose up -d && \
             docker image prune -f"
      displayName: Deploy latest images to VM
